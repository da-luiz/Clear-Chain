# Production profile (used when SPRING_PROFILES_ACTIVE=prod)
#
# If you use H2 in-memory in Docker, the database is empty on every start.
# ddl-auto=validate will fail with "missing table [contracts]" etc.
# Use update until you switch to PostgreSQL + Flyway-only migrations.
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# Quieter logs in prod (optional; override via env if needed)
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
logging.level.org.hibernate.SQL=${SPRING_JPA_SQL_LOG_LEVEL:WARN}
logging.level.org.hibernate.orm.jdbc.bind=${SPRING_JPA_SQL_BIND_LEVEL:WARN}
